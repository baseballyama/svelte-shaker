name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Type-check, lint, format
        run: pnpm all:check

      - name: Test (engine)
        run: pnpm --filter svelte-shaker test

      - name: Build engine
        run: pnpm --filter svelte-shaker build

      - name: Build example (end-to-end shake)
        run: pnpm --filter example build
