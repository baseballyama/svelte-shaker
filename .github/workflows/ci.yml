name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel in-flight runs on the same ref so a fast-forward push doesn't spend
# minutes on stale CI.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Cheap, single-version gate. Catches format / lint / typing violations and
  # the end-to-end build before the test matrix spins up.
  static:
    name: Static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # version comes from package.json "packageManager"
      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build the engine first so its dist/types exist: the example and
      # rollup-plugin packages type-check (and resolve) through the built
      # `svelte-shaker` / `svelte-shaker/vite` package.
      - name: Build engine
        run: pnpm build

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Build example (end-to-end shake)
        run: pnpm --filter example build

      # Differential SSR harness: builds the app twice (with and without the
      # shaker) and asserts byte-equal HTML.  Placed in `static` because the
      # engine is already built here; running it in the `test` matrix would
      # require rebuilding the engine for every Node version unnecessarily.
      - name: E2E differential SSR test
        run: pnpm --filter e2e test

      - name: Check site (@rsvelte/svelte-check)
        run: pnpm --filter site check

      - name: Build playground site (rsvelte compiler + self-dogfooded shake)
        run: pnpm --filter site build

  # Multi-version test matrix for the engine. Node versions track the project's
  # supported runtimes; drop versions past EOL.
  test:
    name: Test (Node ${{ matrix.node-version }})
    needs: static
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['22', '24', '26']
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          # The runner's pre-baked toolcache can lag behind the latest patch
          # (e.g. it ships 22.23.0 while engines requires >=22.23.1). Fetch the
          # newest patch for each major so `pnpm install` passes the engine check.
          check-latest: true
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Test (engine)
        run: pnpm test
