# Build the optional native prop-scanner (`svelte-shaker-engine-scan-native`) for
# every published platform and publish it to npm as a single package that bundles
# all platform `.node` binaries (loaded by `index.cjs`).
#
# rsvelte (the cargo git dependency) is PUBLIC, so the build fetches it without any
# credentials. Publishing is TOKENLESS via npm Trusted Publishers (OIDC) — no
# secret at all — exactly like the main `svelte-shaker` release.
#
# One-time bootstrap (because Trusted Publishers can only be configured on a package
# that already exists): publish `0.1.0` once manually from a local checkout
# (`pnpm --dir packages/svelte-shaker/engine-scan-native build` then `npm publish`),
# then add this repo + workflow as a Trusted Publisher at
# https://www.npmjs.com/package/svelte-shaker-engine-scan-native/access. From then on
# this workflow publishes new versions tokenlessly.
#
# Trigger manually (workflow_dispatch) or by pushing a
# `svelte-shaker-engine-scan-native@*` tag.
name: Prebuild + publish native scanner

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to npm after building (otherwise just upload artifacts)'
        type: boolean
        default: false
  push:
    tags:
      - 'svelte-shaker-engine-scan-native@*'

permissions:
  contents: read

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: 'true'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # `napi` = the `${process.platform}-${process.arch}` tag the loader
          # (`index.cjs`) looks for first.
          - host: macos-latest
            target: x86_64-apple-darwin
            napi: darwin-x64
          - host: macos-latest
            target: aarch64-apple-darwin
            napi: darwin-arm64
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            napi: linux-x64
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            napi: linux-arm64
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            napi: win32-x64
    runs-on: ${{ matrix.host }}
    defaults:
      run:
        working-directory: packages/svelte-shaker/engine-scan-native
    steps:
      - uses: actions/checkout@v4

      # Skip rsvelte's ecosystem-test submodules — they are NOT part of
      # `rsvelte_core`'s build, and two (`submodules/vize`, `submodules/corsa-bind`)
      # are private repos cargo can't fetch anonymously. Marking them inactive +
      # update=none keeps the cargo git checkout from failing on a submodule the
      # build never uses. (rsvelte itself is public, so no auth is configured.)
      - name: Skip rsvelte's private test submodules
        shell: bash
        run: |
          for sm in submodules/vize submodules/corsa-bind; do
            git config --global submodule."$sm".active false
            git config --global submodule."$sm".update none
          done

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # aarch64 linux needs a cross linker.
      - name: Install aarch64 linux toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      # `cargo build` produces the napi cdylib directly — `build.rs` runs
      # `napi_build::setup()` — so we don't need @napi-rs/cli and dodge any CLI
      # version/flag drift. Then rename the cdylib to the platform `.node` the
      # loader resolves.
      - name: Build addon
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename cdylib to a platform .node
        shell: bash
        run: |
          out="svelte-shaker-engine-scan-native.${{ matrix.napi }}.node"
          bin=$(ls "target/${{ matrix.target }}/release"/*.dylib \
                   "target/${{ matrix.target }}/release"/*.so \
                   "target/${{ matrix.target }}/release"/*.dll 2>/dev/null | head -n1)
          echo "binary: $bin -> $out"
          cp "$bin" "$out"

      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: packages/svelte-shaker/engine-scan-native/*.node
          if-no-files-found: error

  publish:
    needs: build
    if: github.event_name == 'push' || inputs.publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC for npm provenance + trusted publishing (no NPM_TOKEN)
    defaults:
      run:
        working-directory: packages/svelte-shaker/engine-scan-native
    steps:
      - uses: actions/checkout@v4
      # Node 24 ships npm >= 11.5.1 (OIDC Trusted Publishers require it). Do NOT set
      # `registry-url` — it writes `_authToken=${NODE_AUTH_TOKEN}` into .npmrc and
      # forces token auth, blocking the OIDC code path.
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0

      # Collect every platform's `.node` next to index.cjs (the loader picks the
      # matching one at require time) and publish the single bundled package.
      - uses: actions/download-artifact@v4
        with:
          path: packages/svelte-shaker/engine-scan-native/artifacts
      - name: Gather binaries
        run: |
          find artifacts -name '*.node' -exec cp {} . \;
          ls -la *.node

      - name: Publish to npm (tokenless, OIDC)
        run: npm publish --provenance --access public
        env:
          NPM_CONFIG_PROVENANCE: 'true'
