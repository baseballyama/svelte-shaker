name: Release

# Changesets-driven publish of `svelte-shaker` to npm.
#
# Flow:
#   1. PRs land on `main` carrying a `.changeset/*.md` file describing the bump.
#   2. This workflow opens (or updates) a "version packages" PR that bumps
#      packages/svelte-shaker/package.json + CHANGELOG.md and removes the
#      consumed changesets.
#   3. Merging that PR re-runs this workflow, which now finds no pending
#      changesets and instead publishes to npm with provenance and creates a
#      GitHub Release for the version bump.
#
# Authentication:
#   Publishing uses npm Trusted Publishers (OIDC) — no NPM_TOKEN secret. The
#   package on npm must be configured to trust this repo + this workflow at
#   https://www.npmjs.com/package/svelte-shaker/access. OIDC is brokered via the
#   `id-token: write` permission below.
#
#   NOTE: npm Trusted Publishers can only be configured on a package that
#   already exists. For the very first release, publish once manually (or with a
#   token) so the package exists, then add the trusted publisher; from then on
#   this workflow publishes tokenless.
#
# Required repo settings:
#   Settings → Actions → General → Workflow permissions:
#   "Read and write permissions" + "Allow GitHub Actions to create and approve
#   pull requests" (so changesets/action can open the version PR).

on:
  push:
    branches:
      - main

permissions:
  contents: write # create/merge release PR, push tags, GitHub Releases
  pull-requests: write # open the "version packages" PR
  id-token: write # OIDC for npm provenance + trusted publishing

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      # Node 24: `changeset publish` shells out to `npm publish`, and OIDC
      # Trusted Publishers require npm CLI >= 11.5.1, which ships with Node 24.
      # CI keeps testing the full Node 22/24/26 matrix; only publish needs the
      # newer npm.
      #
      # Do NOT set `registry-url` here — it would have setup-node write
      # `_authToken=${NODE_AUTH_TOKEN}` into .npmrc and force token auth,
      # blocking the OIDC code path.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Last line of defense before publishing. Build the engine first so the
      # type-check resolves the example / rollup-plugin against fresh dist types.
      - name: Build engine
        run: pnpm build
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test

      - name: Create Release PR or publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          # `pnpm changeset version` consumes pending changesets and writes the
          # version bump + CHANGELOG. `pnpm release` runs `changeset publish`.
          version: pnpm changeset version
          publish: pnpm release
          title: 'chore(release): version packages'
          commit: 'chore(release): version packages'
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
