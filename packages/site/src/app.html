<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="%sveltekit.assets%/favicon.png" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="svelte-shaker removes the dead Svelte code a bundler can't — dead branches, the child components they pull in, and unreachable CSS — by partial-evaluating each Svelte 5 component against how your whole app uses it, before the compiler. Sound, build-time, with an in-browser playground."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://baseballyama.github.io/svelte-shaker/" />
    <meta
      property="og:title"
      content="svelte-shaker — delete the Svelte code your bundler can't"
    />
    <meta
      property="og:description"
      content="Removes the dead Svelte code a bundler can't reach — dead branches, the child components they pull in, and unreachable CSS — by whole-program partial evaluation before the compiler. Sound: it never changes what renders."
    />
    <meta
      property="og:image"
      content="https://baseballyama.github.io/svelte-shaker/og.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="svelte-shaker — delete the Svelte code your bundler can't"
    />
    <meta
      name="twitter:description"
      content="Removes the dead Svelte code a bundler can't reach — dead branches, unused child components, and unreachable CSS — by whole-program partial evaluation before the compiler."
    />
    <meta
      name="twitter:image"
      content="https://baseballyama.github.io/svelte-shaker/og.png"
    />
    <script>
      // Resolve the theme before first paint to avoid a flash.
      try {
        var t =
          localStorage.getItem('theme') ||
          (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.dataset.theme = t;
      } catch (e) {}
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
