[package]
name = "svelte-shaker-engine"
version = "0.0.0"
edition = "2021"
publish = false
description = "WASM core for svelte-shaker (docs/RUST-MIGRATION.md M4+). Self-contained: analyzes a Svelte AST passed as JSON; no rsvelte_core build dependency."

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2.126"
js-sys = "0.3.103"
serde_json = "1.0.150"
# ECMAScript-compliant f64 -> string (Number::toString, ECMA-262 §7.1.12.1).
# `format!("{n}")` diverges from JS at the fixed/exponential cutoffs (e.g. 1e21,
# 1e-7), which would make a folded number render differently than the unshaken
# component. ryu-js implements the spec algorithm; it is pure Rust and builds for
# both the wasm and native targets. Same crate oxc/Boa use for this.
ryu-js = "1.0.3"

# Native callers (e.g. the engine-scan-native napi addon) fan out the
# embarrassingly-parallel per-file model build across cores. wasm has no thread
# pool, so rayon is pulled in only off-wasm and the wasm build is unchanged.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
rayon = "1.12.0"

[profile.release]
opt-level = "s"
lto = true
