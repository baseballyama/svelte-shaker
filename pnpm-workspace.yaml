packages:
  - 'packages/*'

# esbuild's postinstall fetches its platform binary; pnpm 11 requires builds
# to be explicitly allowed (see https://pnpm.io/settings#allowbuilds).
allowBuilds:
  esbuild: true

# @rsvelte/compiler@0.8.1 and the freshly-published native scanner trip the
# minimumReleaseAge supply-chain gate. Allow these exact pinned versions through (both
# are ours); remove each once it ages out.
minimumReleaseAgeExclude:
  - '@rsvelte/compiler@0.8.1'
  - 'svelte-shaker-engine-scan-native@0.2.0'
  - 'svelte-shaker-engine-scan-native@0.3.0'

# Vite 8 pulls lightningcss@^1.32.0 and postcss@^8; a fresh resolve grabs the
# newest, which trips the minimumReleaseAge supply-chain gate when those were
# published within the last day. Pin to the newest builds old enough to pass
# (postcss 8.5.19 is what main already ships). Remove once the gate no longer
# blocks the latest.
overrides:
  lightningcss: 1.32.0
  postcss: 8.5.19
